    <script>
      // Kakao SDK 로드 완료 후 실행되는 함수
      function initializeMap() {
        var mapContainer = document.getElementById("map"), // 지도를 표시할 div
        mapOption = {
          center: new kakao.maps.LatLng(37.1723, 127.0585),   // 오산 세교 지역
          // center: new kakao.maps.LatLng(33.451475, 126.570528), // 제주도 지역
          level: 8, // 지도의 확대 레벨
        };
        ///33.451475, 126.570528
        map = new kakao.maps.Map(mapContainer, mapOption); // 지도를 생성합니다 (전역변수에 할당)

        //=======================================================================================================================================================
        // 내가 해본거 말고 다른걸로 해보는것
        // 2023.03.08
        //=======================================================================================================================================================
        // arrAllSchoolData와 arrANC_Data를 비교하여 일치하는 데이터를 찾아서 처리하는 함수
        window.processData = function() {
          // 기존 마커 제거: 새 학교 타입 선택 시 이전 마커를 모두 제거합니다.
          try {
            if (markers && markers.length > 0) {
              for (var mi = 0; mi < markers.length; mi++) {
                try { markers[mi].setMap(null); } catch(e){}
              }
              markers.length = 0;
            }
          } catch(e) { console.warn('마커 제거 중 오류', e); }

          //const arrFetch = [];
          arrFetch.length = 0;

          arrAllSchoolData.forEach(schoolData => {
            //const matchedSchoolData = arrANC_Data.find(ancData => ancData.School === schoolData.SCHUL_NM);          // find로 했을 때 - 단수일경우      
            const matchedSchoolData = arrANC_Data.filter(ancData => ancData.School === schoolData.SCHUL_NM);          // filter 로 했을 때 - 복수일 경우       

            // find로 했을 때 - 단수일경우
            // if (matchedSchoolData) {
            //     const dataToAdd = { ...schoolData, name: matchedSchoolData.Name };
            //     //console.log("schoolData.FACLT_NM : ", schoolData.FACLT_NM, "dataToAdd", dataToAdd);
            //     arrFetch.push(dataToAdd);
            // }

            // filter 로 했을 때 - 복수일 경우 
            let bFirst = true;
            let strName = "";
            if (matchedSchoolData.length > 0) {
              matchedSchoolData.forEach(metchedData => {

                if (bFirst === true) {
                  strName = metchedData.Name;
                  bFirst = false;
                }
                else {
                  strName += ", " + metchedData.Name;
                }
              })
              //console.log(strName);
              const dataToAdd = { ...schoolData, Name: strName };
              arrFetch.push(dataToAdd);
            }
          });

          let i = 1; // 이런 경우 굳이 인덱스 일 필요(0으로 시작할 필요)가?

          //.log(arrFetch);
          arrFetch.forEach(element => {
            console.log('Popup data:', element.SCHUL_NM, element.SCHUL_CODE, 'has_stats:', !!element._stats, element._stats || '(no _stats)');
          var latitude = element.LTTUD;
          var longitude = element.LGTUD;


          contents = CreateContentsTag(
            i,
            element.SCHUL_NM,
            "",
            element.SCHUL_RDNMA,
            element.DTLAD_BRKDN,
            element.HMPG_ADRES || "",
            element.Name,
            element.COEDU_SC_CODE || '',
            element._stats || null
          );


          // 커스텀 오버레이가 표시될 위치입니다
          var position = new kakao.maps.LatLng(latitude, longitude);

          // 지도에 마커를 표시합니다
          var marker = new kakao.maps.Marker({
            map: map,
            position: position, //new kakao.maps.LatLng(latitude, longitude),
          });

          markers.push(marker);

          // 커스텀 오버레이를 생성합니다
          var customOverlay = new kakao.maps.CustomOverlay({
            content: contents,
            map: map,
            position: marker.getPosition()
          });

          // 마커를 클릭했을 때 커스텀 오버레이를 표시합니다
          kakao.maps.event.addListener(marker, "click", function () {
            customOverlay.setMap(map);
          });

          // 닫는 동작 하기 위해서
          AddClickEventListener(i, customOverlay);

          // 기본적으로 닫아놓고 마커만 표시해놓는다. 
          customOverlay.setMap(null);
          i++;
          });
        };

        //-------------------------------------------------------------------------------------------------------------------------------------------------------

        // 위에서 작성한 코드를 사용하여 데이터 처리
        var api_key = "78d56edb8f784428854ce15ce720fe86";
        var apiBase = 'https://www.schoolinfo.go.kr/openApi.do';

        // sggCode 설정: 여러 시를 한 번에 가져오려면 쉼표로 구분하세요.
        // 예: '41370' 또는 '41370,41110'
        var sggParam = '41370,41110,41591,41593,41595,41597'; // 기본: 오산시

        // pbanYr 계산: 현재 월이 6월 이상이면 올해, 아니면 작년
        var now = new Date();
        var apiPbanYr = (now.getMonth() + 1 >= 6) ? now.getFullYear() : (now.getFullYear() - 1);
        // 표시할 '작년' 연도는 apiPbanYr - 1 (요청 연도 기준에서 '작년'을 표시)
        var statsDisplayYear = apiPbanYr - 1;

        // 현재 선택된 학교종류 (기본 고등학교)
        var currentSchulKnd = '04';
        // helper: 단일 sggCode에 대한 대상 URL 생성 (apiType을 지정 가능)
        function buildTargetUrl(sgg, apiType, schulKnd) {
          apiType = typeof apiType !== 'undefined' ? apiType : '0';
          schulKnd = typeof schulKnd !== 'undefined' ? schulKnd : currentSchulKnd;
          var queryParams = '?' + encodeURIComponent('apiKey') + '='+api_key;
          queryParams += '&' + encodeURIComponent('apiType') + '=' + encodeURIComponent(apiType);
          queryParams += '&' + encodeURIComponent('sidoCode') + '=' + encodeURIComponent('41'); // 경기도
          queryParams += '&' + encodeURIComponent('sggCode') + '=' + encodeURIComponent(sgg);
          queryParams += '&' + encodeURIComponent('schulKndCode') + '=' + encodeURIComponent(schulKnd);
          return apiBase + queryParams;
        }

        // apiType=09로 통계(학급/학생/교사) 데이터를 가져와 학교명 기준으로 매핑해서 반환
        function fetchStatsForSggCodes(codes) {
          var statsFetches = codes.map(code => {
            var t = buildTargetUrl(code, '09');
            // pbanYr 필수 파라미터 추가
            t += '&' + encodeURIComponent('pbanYr') + '=' + encodeURIComponent(apiPbanYr);
            var u = 'http://localhost:3000/proxy?url=' + encodeURIComponent(t);
            return fetch(u).then(r => r.json()).catch(e => { console.warn('stats 요청 실패:', code, e); return null; });
          });

          return Promise.all(statsFetches).then(results => {
            var map = {};
            var totalCount = 0;
            results.forEach(d => {
              if (d && d.resultCode === 'success' && Array.isArray(d.list)) {
                totalCount += d.list.length;
                d.list.forEach(item => {
                  // 가능한 키(SCHUL_CODE, SCHUL_NM)를 모두 저장
                  if (item.SCHUL_CODE) map[item.SCHUL_CODE] = item;
                  if (item.SCHUL_NM && !map[item.SCHUL_NM]) map[item.SCHUL_NM] = item;
                });
              } else {
                console.warn('stats 응답 문제:', d && d.resultMsg);
              }
            });
            console.log('통계 응답 항목 수:', totalCount, '매핑 키 수:', Object.keys(map).length);
            return map;
          });
        }

        var sggCodes = sggParam.split(',').map(s => s.trim()).filter(Boolean);

        if (sggCodes.length === 1) {
          var targetUrl = buildTargetUrl(sggCodes[0]);
          var uri = 'http://localhost:3000/proxy?url=' + encodeURIComponent(targetUrl);
          fetch(uri)
            .then(response => response.json())
            .then(data => {
              console.log('📡 초기 로드 API 응답:', data);
              if (data && data.resultCode === 'success' && Array.isArray(data.list) && data.list.length > 0) {
                arrAllSchoolData = data.list;
                console.log('✓ 학교 데이터 로드 성공:', arrAllSchoolData.length, '개');
                // 통계(apiType=09) 가져와서 병합 후 처리
                fetchStatsForSggCodes(sggCodes).then(statsMap => {
                  arrAllSchoolData.forEach(s => {
                    // 우선 학교 코드로 매칭, 없으면 이름으로 매칭
                    if (s.SCHUL_CODE && statsMap[s.SCHUL_CODE]) s._stats = statsMap[s.SCHUL_CODE];
                    else if (statsMap[s.SCHUL_NM]) s._stats = statsMap[s.SCHUL_NM];
                    // 통계 표시 연도 추가
                    if (s._stats) s._stats._displayYear = statsDisplayYear;
                  });
                  processData();
                }).catch(e => { console.warn('통계 병합 실패', e); processData(); });
              } else {
                console.warn('⚠️ 학교 데이터를 찾을 수 없음 또는 API 에러:', data && data.resultMsg);
                loadAddrDataDirectly();
              }
            })
            .catch(err => {
              console.error('❌ 초기 로드 API 요청 실패:', err);
              loadAddrDataDirectly();
            });
        } else {
          // 여러 sggCode 병렬 요청 후 결과 합치기
          var fetches = sggCodes.map(code => {
            var t = buildTargetUrl(code);
            var u = 'http://localhost:3000/proxy?url=' + encodeURIComponent(t);
            return fetch(u).then(r => r.json()).catch(e => { console.warn('요청 실패:', code, e); return null; });
          });

          Promise.all(fetches).then(results => {
            var combined = [];
            results.forEach(d => {
              if (d && d.resultCode === 'success' && Array.isArray(d.list)) {
                combined = combined.concat(d.list);
              } else {
                console.warn('⚠️ 일부 요청에서 데이터 누락 또는 에러:', d && d.resultMsg);
              }
            });

            if (combined.length > 0) {
              arrAllSchoolData = combined;
              console.log('✓ 병합된 학교 데이터 개수:', arrAllSchoolData.length);
              // 통계(apiType=09) 가져와서 병합 후 처리
              fetchStatsForSggCodes(sggCodes).then(statsMap => {
                arrAllSchoolData.forEach(s => {
                  // 우선 학교 코드로 매칭, 없으면 이름으로 매칭
                  if (s.SCHUL_CODE && statsMap[s.SCHUL_CODE]) s._stats = statsMap[s.SCHUL_CODE];
                  else if (statsMap[s.SCHUL_NM]) s._stats = statsMap[s.SCHUL_NM];
                  if (s._stats) s._stats._displayYear = statsDisplayYear;
                });
                processData();
              }).catch(e => { console.warn('통계 병합 실패', e); processData(); });
            } else {
              console.warn('⚠️ 모든 요청에서 데이터가 없습니다. 학생 데이터 사용');
              loadAddrDataDirectly();
            }
          }).catch(err => {
            console.error('❌ 병렬 요청 처리 실패:', err);
            loadAddrDataDirectly();
          });
        }

        // Overrideable setSchoolInfo: 학교 종류(초/중/고)를 선택하면 학교 목록과 통계를 다시 불러와 병합합니다.
        window.setSchoolInfo = function(schooltype) {
          var elementarySchoolControl = document.getElementById("btnElemtarySchool");
          var middleSchoolControl = document.getElementById("btnMiddleSchool");
          var highSchoolControl = document.getElementById("btnHighSchool");
          if (schooltype === "Elementary") {
            elementarySchoolControl.className = "selected_btn";
            middleSchoolControl.className = "btn";
            highSchoolControl.className = "btn";
            currentSchulKnd = '02';
          } else if (schooltype === "Middle") {
            elementarySchoolControl.className = "btn";
            middleSchoolControl.className = "selected_btn";
            highSchoolControl.className = "btn";
            currentSchulKnd = '03';
          } else {
            elementarySchoolControl.className = "btn";
            middleSchoolControl.className = "btn";
            highSchoolControl.className = "selected_btn";
            currentSchulKnd = '04';
          }

          // 학교 목록 불러오기 (다중 sgg 지원)
          var fetches = sggCodes.map(code => {
            var t = buildTargetUrl(code, '0', currentSchulKnd);
            var u = 'http://localhost:3000/proxy?url=' + encodeURIComponent(t);
            return fetch(u).then(r => r.json()).catch(e => { console.warn('요청 실패:', code, e); return null; });
          });

          Promise.all(fetches).then(results => {
            var combined = [];
            results.forEach(d => {
              if (d && d.resultCode === 'success' && Array.isArray(d.list)) {
                combined = combined.concat(d.list);
              } else {
                console.warn('⚠️ 일부 요청에서 데이터 누락 또는 에러:', d && d.resultMsg);
              }
            });

            if (combined.length > 0) {
              arrAllSchoolData = combined;
              console.log('✓ 학교 데이터 로드(선택):', arrAllSchoolData.length);
              // 통계(apiType=09) 가져와서 병합 후 처리
              fetchStatsForSggCodes(sggCodes).then(statsMap => {
                arrAllSchoolData.forEach(s => {
                  if (s.SCHUL_CODE && statsMap[s.SCHUL_CODE]) s._stats = statsMap[s.SCHUL_CODE];
                  else if (statsMap[s.SCHUL_NM]) s._stats = statsMap[s.SCHUL_NM];
                  if (s._stats) s._stats._displayYear = statsDisplayYear;
                });
                processData();
              }).catch(e => { console.warn('통계 병합 실패', e); processData(); });
            } else {
              console.warn('⚠️ 선택한 조건으로 학교 데이터가 없음');
              processData();
            }
          }).catch(err => { console.error('❌ 학교 목록 요청 실패:', err); processData(); });
        }

        // XMLHttpRequest로 addr.json 파일 읽기
        var xhr = new XMLHttpRequest();
        xhr.open('GET', './addr.json', true);
        
        xhr.onload = function() {
          // file:// 프로토콜에서는 상태가 0으로 올 수 있음
          if (xhr.status === 200 || xhr.status === 0) {
            try {
              console.log('📝 addr.json 텍스트 받음, 길이:', xhr.responseText.length);
              const data = JSON.parse(xhr.responseText);
              arrANC_Data = data;
              console.log('✓ 주소 데이터 로드 성공 (파일):', arrANC_Data.length, '개');
              processData();
            } catch (parseErr) {
              console.warn('⚠️ JSON 파싱 오류:', parseErr.message);
              console.log('파일 내용 처음 200자:', xhr.responseText.substring(0, 200));
              loadAddrDataDirectly();
            }
          } else {
            console.warn('⚠️ 파일 로드 실패 (상태:', xhr.status + ')');
            loadAddrDataDirectly();
          }
        };
        
        xhr.onerror = function() {
          console.warn('⚠️ 주소 데이터 로드 실패 (네트워크 에러)');
          console.log('직접 데이터로 대체합니다.');
          loadAddrDataDirectly();
        };
        
        xhr.send();

        console.log(arrFetch);
      }

      // Kakao SDK가 로드될 때까지 기다렸다가 맵 초기화
      function waitForKakao() {
        // kakao.maps.LatLng 생성자가 존재하는지 확인 (SDK 완전 로드 확인)
        if (typeof kakao !== 'undefined' && 
            typeof kakao.maps !== 'undefined' && 
            typeof kakao.maps.LatLng === 'function') {
          initializeMap();
        } else {
          // Kakao SDK가 아직 로드되지 않았으면 100ms 후 다시 확인
          setTimeout(waitForKakao, 100);
        }
      }

      // DOM이 준비되고 Kakao SDK 로드 대기
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', waitForKakao);
      } else {
        waitForKakao();
      }
      
      // 페이지 로드 후에도 확인 (안전장치)
      window.addEventListener('load', waitForKakao);
    </script>
  </body>
</html>
