<!DOCTYPE html>
<html>
  <head>
    <meta charset="Utf-8" />
    <title>학교 위치 정보 지도</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=920f04a92b0d4bff8ceccf191eede4a3&libraries=services"></script>
  </head>
  <body>
    <div class="map_wrap">
      <div id="map" style="width: 100%; height: 100%; position: relative; overflow: hidden"></div>
      <div class="custom_selector_school_grade radius_border">
        <span id="btnElemtarySchool" class="btn" onclick="setSchoolInfo('Elementary')">초등학교</span>
        <span id="btnMiddleSchool" class="btn" onclick="setSchoolInfo('Middle')">중학교</span>
        <span id="btnHighSchool" class="selected_btn" onclick="setSchoolInfo('High')">고등학교</span>
      </div>
      <div class="custom_typecontrol radius_border">
        <span id="btnRoadmap" class="selected_btn" onclick="setMapType('roadmap')">지도</span>
        <span id="btnSkyview" class="btn" onclick="setMapType('skyview')">스카이뷰</span>
      </div>
      <div class="custom_zoomcontrol radius_border" aria-label="지도 확대 축소">
        <span class="zoom-btn" onclick="zoomIn()">
          <img src="https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/ico_plus.png" alt="확대" />
        </span>
        <span class="zoom-btn" onclick="zoomOut()">
          <img src="https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/ico_minus.png" alt="축소" />
        </span>
      </div>
    </div>

    <script>
      var map;
      let markers = [];
      let arrAllSchoolData = [];
      let arrANC_Data = [];
      let arrFetch = [];
      let dataLoadStatus = {
        schoolDataLoaded: false,
        ancDataLoaded: false
      };
    </script>

    <script src="function.js"></script>
    
    <script>
      function loadAddrDataDirectly() {
        console.log('⚠️ 백업 학생 데이터 로드');
        arrANC_Data = [
          {"Name": "김예찬", "School": "문시중학교", "Year": 1},
          {"Name": "이태민", "School": "운천중학교", "Year": 1},
          {"Name": "이예은", "School": "능실중학교", "Year": 1},
          {"Name": "김하닮", "School": "운천중학교", "Year": 2},
          {"Name": "전주역", "School": "운천중학교", "Year": 2},
          {"Name": "이유빈", "School": "운천중학교", "Year": 2},
          {"Name": "안정은", "School": "안용중학교", "Year": 2},
          {"Name": "아브리아나", "School": "운천중학교", "Year": 2},
          {"Name": "원예진", "School": "안용중학교", "Year": 2},
          {"Name": "이다민", "School": "운천중학교", "Year": 3},
          {"Name": "김세찬", "School": "문시중학교", "Year": 3},
          {"Name": "이예진", "School": "능실중학교", "Year": 3},
          {"Name": "전세라", "School": "운천고등학교", "Year": 1},
          {"Name": "김누림", "School": "운천고등학교", "Year": 1},
          {"Name": "최보검", "School": "운암고등학교", "Year": 2},
          {"Name": "최주은", "School": "운천고등학교", "Year": 2},
          {"Name": "유민영", "School": "예당고등학교", "Year": 2},
          {"Name": "전지호", "School": "경기과학고등학교", "Year": 2},
          {"Name": "김세이", "School": "운천고등학교", "Year": 3},
          {"Name": "전세영", "School": "운암고등학교", "Year": 3}
        ];
        dataLoadStatus.ancDataLoaded = true;
        console.log('✓ 백업 데이터 로드:', arrANC_Data.length + '명');
        if (dataLoadStatus.schoolDataLoaded) {
          window.processData();
        }
      }
    </script>
    
    <script>
      function initializeMap() {
        var mapContainer = document.getElementById("map");
        var mapOption = {
          center: new kakao.maps.LatLng(37.1723, 127.0585),
          level: 8
        };
        
        map = new kakao.maps.Map(mapContainer, mapOption);
        console.log('🗺️ 지도 초기화 완료');

        window.processData = function() {
          console.log('📊 데이터 처리:', {
            학교: arrAllSchoolData.length,
            학생: arrANC_Data.length
          });
          
          // 기존 마커 제거
          markers.forEach(m => { try { m.setMap(null); } catch(e){} });
          markers = [];

          arrFetch = [];

          // 데이터 병합: 학교 이름이 일치하는 학생 찾기
          arrAllSchoolData.forEach(school => {
            const students = arrANC_Data.filter(s => s.School === school.SCHUL_NM);
            if (students.length > 0) {
              const names = students.map(s => s.Name + (s.Year ? '(' + s.Year + ')' : '')).join(', ');
              arrFetch.push({ ...school, Name: names });
            }
          });

          console.log('✓ 병합 완료:', arrFetch.length + '개 학교');

          // 마커 생성
          let idx = 1;
          arrFetch.forEach(el => {
            const position = new kakao.maps.LatLng(el.LTTUD, el.LGTUD);
            
            const marker = new kakao.maps.Marker({ map, position });
            markers.push(marker);

            const content = CreateContentsTag(
              idx, el.SCHUL_NM, "", el.SCHUL_RDNMA, el.DTLAD_BRKDN,
              el.HMPG_ADRES || "", el.Name, el.FOND_SC_CODE || '',
              el.USER_TELNO || el.TELNO || '', el.PERC_FAXNO || el.FAXNO || '',
              el.COEDU_SC_CODE || '', el._stats || null
            );

            const overlay = new kakao.maps.CustomOverlay({
              content, map, position
            });

            kakao.maps.event.addListener(marker, "click", function () {
              overlay.setMap(map);
            });

            try {
              document.getElementById("info_close_" + idx).addEventListener("click", function () {
                overlay.setMap(null);
              });
            } catch(e) {}

            overlay.setMap(null);
            idx++;
          });

          console.log('✓ 지도 표시 완료:', markers.length + '개 마커');
        };

        // ✅ Vercel API 프록시 호출
        var currentSchulKnd = '04';
        var sggCodes = ['41370', '41110', '41591', '41593', '41595', '41597'];
        var statsYear = String(new Date().getFullYear() - 1); // 전년도 통계

        console.log('📍 학교 데이터 로드 시작...');

        function fetchSchoolData(sgg, schulKnd) {
          return fetch('/api/schoolinfo?sgg=' + sgg + '&apiType=0&schulKndCode=' + schulKnd)
            .then(r => r.json())
            .catch(err => { console.warn('⚠️ 목록 ' + sgg + ' 실패:', err.message); return null; });
        }

        function fetchSchoolStats(sgg, schulKnd) {
          return fetch('/api/schoolinfo?sgg=' + sgg + '&apiType=09&schulKndCode=' + schulKnd + '&pbanYr=' + statsYear)
            .then(r => r.json())
            .catch(err => { console.warn('⚠️ 통계 ' + sgg + ' 실패:', err.message); return null; });
        }

        function buildStatsMap(statsResults) {
          var map = {};
          statsResults.forEach(data => {
            if (data && data.resultCode === 'success' && data.list) {
              data.list.forEach(stat => {
                // 학교 코드 또는 학교명으로 키 생성
                var key = stat.SCHUL_CODE || stat.SD_SCHUL_CODE || stat.SCHUL_NM;
                if (key) map[key] = stat;
              });
            }
          });
          return map;
        }

        function attachStats(schools, statsMap) {
          schools.forEach(school => {
            var key = school.SCHUL_CODE || school.SD_SCHUL_CODE || school.SCHUL_NM;
            if (key && statsMap[key]) {
              school._stats = statsMap[key];
              school._stats._displayYear = statsYear;
            }
          });
        }

        function loadSchoolAndStats(schulKnd) {
          return Promise.all([
            Promise.all(sggCodes.map(sgg => fetchSchoolData(sgg, schulKnd))),
            Promise.all(sggCodes.map(sgg => fetchSchoolStats(sgg, schulKnd)))
          ]).then(function(results) {
            var listResults = results[0];
            var statsResults = results[1];

            let combined = [];
            listResults.forEach(data => {
              if (data && data.resultCode === 'success' && data.list && data.list.length > 0) {
                combined = combined.concat(data.list);
              }
            });

            if (combined.length > 0) {
              var statsMap = buildStatsMap(statsResults);
              attachStats(combined, statsMap);
              console.log('✓ 학교 데이터 로드:', combined.length + '개, 통계 매핑:', Object.keys(statsMap).length + '개');
            }
            return combined;
          });
        }

        loadSchoolAndStats(currentSchulKnd)
          .then(combined => {
            if (combined.length > 0) {
              arrAllSchoolData = combined;
              dataLoadStatus.schoolDataLoaded = true;
              if (dataLoadStatus.ancDataLoaded) window.processData();
            } else {
              console.warn('⚠️ API 요청 실패, 백업 데이터 사용');
              loadAddrDataDirectly();
            }
          })
          .catch(err => {
            console.warn('⚠️ 학교 데이터 로드 실패:', err.message);
            loadAddrDataDirectly();
          });

        // ✅ 학교 종류 선택
        window.setSchoolInfo = function(type) {
          const elem = document.getElementById("btnElemtarySchool");
          const mid = document.getElementById("btnMiddleSchool");
          const high = document.getElementById("btnHighSchool");

          if (type === "Elementary") {
            elem.className = "selected_btn"; mid.className = "btn"; high.className = "btn";
            currentSchulKnd = '02';
          } else if (type === "Middle") {
            elem.className = "btn"; mid.className = "selected_btn"; high.className = "btn";
            currentSchulKnd = '03';
          } else {
            elem.className = "btn"; mid.className = "btn"; high.className = "selected_btn";
            currentSchulKnd = '04';
          }

          loadSchoolAndStats(currentSchulKnd)
            .then(combined => {
              if (combined.length > 0) {
                arrAllSchoolData = combined;
                window.processData();
              }
            });
        };

        // ✅ addr.json 로드
        console.log('📝 학생 데이터 로드...');
        
        fetch('./addr.json')
          .then(r => r.json())
          .then(data => {
            if (Array.isArray(data) && data.length > 0) {
              arrANC_Data = data;
              dataLoadStatus.ancDataLoaded = true;
              console.log('✓ 학생 데이터 로드:', data.length + '명');
              if (dataLoadStatus.schoolDataLoaded) {
                window.processData();
              }
            } else {
              throw new Error('Invalid data');
            }
          })
          .catch(err => {
            console.warn('⚠️ 파일 로드 실패:', err.message);
            loadAddrDataDirectly();
          });
      }

      var mapInitialized = false;
      function waitForKakao() {
        if (mapInitialized) return;
        if (typeof kakao !== 'undefined' && kakao.maps && kakao.maps.LatLng) {
          mapInitialized = true;
          console.log('✓ Kakao SDK 준비 완료');
          initializeMap();
        } else {
          setTimeout(waitForKakao, 100);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', waitForKakao);
      } else {
        waitForKakao();
      }

      window.addEventListener('load', waitForKakao);
    </script>
  </body>
</html>
