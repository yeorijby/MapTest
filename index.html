    <script>
      // Kakao SDK 로드 완료 후 실행되는 함수입니다.
      function initializeMap() {
        // 지도 컨테이너와 옵션 설정
        var mapContainer = document.getElementById("map");
        var mapOption = {
          // 오산 세교 지역 중심
          center: new kakao.maps.LatLng(37.1723, 127.0585),
          level: 8, // 지도 확대 레벨 (8 = 중간 줌)
        };
        
        // 전역 map 변수에 지도 객체 할당합니다.
        map = new kakao.maps.Map(mapContainer, mapOption);

        console.log('🗺️ 지도 초기화 완료');

        //=======================================================================================
        // 학교 데이터와 학생 데이터를 병합하여 지도에 표시합니다.
        //=======================================================================================
        
        // processData() 함수: 병합된 데이터를 지도에 표시하는 핵심 함수
        window.processData = function() {
          console.log('📊 데이터 처리 시작...');
          
          // 기존 마커 모두 제거: 새 학교 타입 선택 시 이전 마커를 제거합니다.
          try {
            if (markers && markers.length > 0) {
              for (var mi = 0; mi < markers.length; mi++) {
                try { 
                  markers[mi].setMap(null); // 지도에서 마커 제거
                } catch(e){}
              }
              markers.length = 0; // 배열 초기화
            }
          } catch(e) { 
            console.warn('마커 제거 중 오류', e); 
          }

          // 최종 병합 데이터 배열 초기화
          arrFetch.length = 0;

          // 학교 데이터 반복: 각 학교와 일치하는 학생 찾기
          arrAllSchoolData.forEach(schoolData => {
            // filter() 사용: 한 학교에 여러 학생이 있을 수 있음
            const matchedSchoolData = arrANC_Data.filter(
              ancData => ancData.School === schoolData.SCHUL_NM
            );

            // 일치하는 학생이 있을 경우만 처리
            if (matchedSchoolData.length > 0) {
              // 학생 이름들을 합쳐서 표시 (학년 포함)
              // 예: '정이려(2), 정이도(2)'
              let names = [];
              matchedSchoolData.forEach(metchedData => {
                var nm = metchedData.Name || '';
                var yr = (metchedData.Year !== undefined && metchedData.Year !== null) 
                  ? String(metchedData.Year) 
                  : '';
                if (yr !== '') nm = nm + '(' + yr + ')'; // 학년 추가
                names.push(nm);
              });
              
              // 학교 데이터에 학생 정보 병합
              const dataToAdd = { ...schoolData, Name: names.join(', ') };
              arrFetch.push(dataToAdd);
            }
          });

          console.log('✓ 병합 완료:', arrFetch.length, '개 학교에 학생 정보 추가됨');

          // 인덱스 번호 (마커 식별용)
          let i = 1;

          // 병합된 데이터로 마커와 팝업 생성
          arrFetch.forEach(element => {
            // 위도, 경도 추출
            var latitude = element.LTTUD;
            var longitude = element.LGTUD;

            // 팝업 내용 생성
            contents = CreateContentsTag(
              i,
              element.SCHUL_NM,              // 학교명
              "",                            // 이미지 URL (있으면 추가)
              element.SCHUL_RDNMA,           // 도로명 주소
              element.DTLAD_BRKDN,           // 지번 주소
              element.HMPG_ADRES || "",      // 홈페이지
              element.Name,                  // 학생명 (병합된 데이터)
              element.FOND_SC_CODE || '',    // 설립구분
              element.USER_TELNO || element.TELNO || '',  // 전화번호
              element.PERC_FAXNO || element.FAXNO || '', // 팩스번호
              element.COEDU_SC_CODE || '',   // 공학구분
              element._stats || null         // 통계 정보
            );

            // 지도에 마커 표시
            var position = new kakao.maps.LatLng(latitude, longitude);
            var marker = new kakao.maps.Marker({
              map: map,
              position: position,
            });
            markers.push(marker); // 마커 배열에 저장

            // 커스텀 오버레이(팝업) 생성
            var customOverlay = new kakao.maps.CustomOverlay({
              content: contents,
              map: map,
              position: marker.getPosition()
            });

            // 마커 클릭 이벤트: 클릭 시 팝업 표시
            kakao.maps.event.addListener(marker, "click", function () {
              customOverlay.setMap(map);
            });

            // 팝업 닫기 버튼 이벤트 설정
            AddClickEventListener(i, customOverlay);

            // 기본적으로 팝업은 닫혀있고 마커만 표시
            customOverlay.setMap(null);
            
            i++; // 다음 마커 인덱스
          });

          console.log('✓ 지도 표시 완료:', arrFetch.length, '개 마커 생성됨');
        };

        //=======================================================================================
        // 학교 정보 API 설정 및 요청
        //=======================================================================================
        
        // API 키 설정
        var api_key = "";
        if (typeof window !== 'undefined') {
          // 브라우저 환경에서만 실행
          if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            // 로컬 개발 환경: 직접 API 키 사용
            api_key = '78d56edb8f784428854ce15ce720fe86';
          } else {
            // Vercel 배포 환경: 서버에서 처리 (API 키 노출 방지)
            api_key = '';
          }
        }

        var apiBase = 'https://www.schoolinfo.go.kr/openApi.do';

        // 지역 코드: 오산, 용인, 수원 등 여러 시군구
        var sggParam = '41370,41110,41591,41593,41595,41597';

        // 통계 데이터 연도 계산
        // 6월 이상이면 올해, 아니면 작년 데이터 사용
        var now = new Date();
        var apiPbanYr = (now.getMonth() + 1 >= 6) ? now.getFullYear() : (now.getFullYear() - 1);
        var statsDisplayYear = apiPbanYr - 1;

        // 현재 선택된 학교 종류 (기본값: 고등학교)
        var currentSchulKnd = '04';

        // 대상 URL 생성 함수
        function buildTargetUrl(sgg, apiType, schulKnd) {
          apiType = typeof apiType !== 'undefined' ? apiType : '0';
          schulKnd = typeof schulKnd !== 'undefined' ? schulKnd : currentSchulKnd;
          var queryParams = '?' + encodeURIComponent('apiKey') + '='+api_key;
          queryParams += '&' + encodeURIComponent('apiType') + '=' + encodeURIComponent(apiType);
          queryParams += '&' + encodeURIComponent('sidoCode') + '=' + encodeURIComponent('41'); // 경기도
          queryParams += '&' + encodeURIComponent('sggCode') + '=' + encodeURIComponent(sgg);
          queryParams += '&' + encodeURIComponent('schulKndCode') + '=' + encodeURIComponent(schulKnd);
          return apiBase + queryParams;
        }

        // 프록시 설정: 로컬 또는 Vercel 환경 자동 판별
        var proxyBase = (typeof window.PROXY_BASE !== 'undefined') 
          ? window.PROXY_BASE 
          : 'http://localhost:3000/proxy?url=';

        // 안전한 fetch 헬퍼 함수: 프록시를 통한 요청
        function tryFetchRaw(targetUrl) {
          var attemptedProxy = null;

          try {
            // Vercel 서버리스 API 사용 시
            if (proxyBase && proxyBase.indexOf('/api/schoolinfo') !== -1) {
              try {
                var u = new URL(targetUrl);
                // 학교정보 API 확인
                if (u.hostname && u.hostname.indexOf('schoolinfo.go.kr') !== -1) {
                  var srcParams = new URLSearchParams(u.search);
                  var sgg = srcParams.get('sggCode');
                  var apiTypeParam = srcParams.get('apiType') || '0';
                  var schul = srcParams.get('schulKndCode') || currentSchulKnd;
                  
                  // 서버 API 엔드포인트에 파라미터 전달
                  attemptedProxy = proxyBase;
                  if (attemptedProxy.indexOf('?') === -1) attemptedProxy += '?';
                  if (!attemptedProxy.endsWith('?') && !attemptedProxy.endsWith('&')) attemptedProxy += '&';
                  attemptedProxy += 'sgg=' + encodeURIComponent(sgg || '') 
                    + '&apiType=' + encodeURIComponent(apiTypeParam) 
                    + '&schulKndCode=' + encodeURIComponent(schul || '');
                } else {
                  attemptedProxy = proxyBase + encodeURIComponent(targetUrl);
                }
              } catch (e) {
                attemptedProxy = proxyBase + encodeURIComponent(targetUrl);
              }
            } else {
              // 로컬 프록시 사용
              attemptedProxy = proxyBase ? (proxyBase + encodeURIComponent(targetUrl)) : targetUrl;
            }
          } catch (e) {
            attemptedProxy = proxyBase ? (proxyBase + encodeURIComponent(targetUrl)) : targetUrl;
          }

          // 프록시를 통한 fetch 요청
          return fetch(attemptedProxy, { credentials: 'omit' })
            .then(function (res) {
              if (!res.ok && proxyBase) {
                throw new Error('Proxy request failed with status ' + res.status);
              }
              return res;
            })
            .catch(function (err) {
              if (proxyBase) {
                throw err; // 프록시 실패 시 백업하지 않음
              }
              // 프록시 없으면 직접 요청 시도
              return fetch(targetUrl);
            });
        }

        // JSON 응답 반환 함수
        function tryFetchJson(targetUrl) {
          return tryFetchRaw(targetUrl)
            .then(function (r) { 
              return r.json(); 
            })
            .catch(err => {
              console.error('❌ fetch JSON 실패:', err.message);
              throw err;
            });
        }

        // apiType=09 (통계 데이터) 요청 함수
        function fetchStatsForSggCodes(codes) {
          var statsFetches = codes.map(code => {
            var t = buildTargetUrl(code, '09');
            t += '&' + encodeURIComponent('pbanYr') + '=' + encodeURIComponent(apiPbanYr);
            return tryFetchJson(t)
              .catch(e => { 
                console.warn('통계 요청 실패:', code, e.message); 
                return null; 
              });
          });

          return Promise.all(statsFetches).then(results => {
            var map = {};
            var totalCount = 0;
            
            // 통계 응답 데이터 처리
            results.forEach(d => {
              if (d && d.resultCode === 'success' && Array.isArray(d.list)) {
                totalCount += d.list.length;
                d.list.forEach(item => {
                  // 학교 코드나 학교명 기준으로 매핑
                  if (item.SCHUL_CODE) map[item.SCHUL_CODE] = item;
                  if (item.SCHUL_NM && !map[item.SCHUL_NM]) map[item.SCHUL_NM] = item;
                });
              } else {
                console.warn('⚠️ 통계 응답 문제:', d?.resultMsg);
              }
            });
            console.log('📊 통계 데이터 매핑 완료:', totalCount, '개');
            return map;
          });
        }

        // 지역 코드 배열
        var sggCodes = sggParam.split(',').map(s => s.trim()).filter(Boolean);

        // 초기 데이터 로드 (단일 또는 다중 지역)
        if (sggCodes.length === 1) {
          // 단일 지역: 간단한 요청
          var targetUrl = buildTargetUrl(sggCodes[0]);
          tryFetchJson(targetUrl)
            .then(data => {
              console.log('📡 초기 로드 API 응답:', {
                status: data?.resultCode,
                count: data?.list?.length || 0
              });
              
              if (data && data.resultCode === 'success' && Array.isArray(data.list) && data.list.length > 0) {
                arrAllSchoolData = data.list;
                dataLoadStatus.schoolDataLoaded = true;
                console.log('✓ 학교 데이터 로드 완료:', arrAllSchoolData.length, '개');
                
                // ✅ 수정: 통계 데이터 병합
                fetchStatsForSggCodes(sggCodes).then(statsMap => {
                  arrAllSchoolData.forEach(s => {
                    if (s.SCHUL_CODE && statsMap[s.SCHUL_CODE]) 
                      s._stats = statsMap[s.SCHUL_CODE];
                    else if (statsMap[s.SCHUL_NM]) 
                      s._stats = statsMap[s.SCHUL_NM];
                    if (s._stats) 
                      s._stats._displayYear = statsDisplayYear;
                  });
                  
                  // ✅ 두 데이터 모두 로드 완료 시 처리
                  if (dataLoadStatus.ancDataLoaded) {
                    window.processData();
                  }
                }).catch(e => { 
                  console.warn('통계 병합 실패', e); 
                  if (dataLoadStatus.ancDataLoaded) window.processData();
                });
              } else {
                console.warn('⚠️ 학교 데이터 없음:', data?.resultMsg);
                loadAddrDataDirectly();
              }
            })
            .catch(err => {
              console.error('❌ 초기 로드 실패:', err.message);
              loadAddrDataDirectly();
            });
        } else {
          // 다중 지역: 병렬 요청
          var fetches = sggCodes.map(code => {
            var t = buildTargetUrl(code);
            return tryFetchJson(t)
              .catch(e => { 
                console.warn('지역별 요청 실패:', code, e.message); 
                return null; 
              });
          });

          Promise.all(fetches).then(results => {
            var combined = [];
            results.forEach(d => {
              if (d && d.resultCode === 'success' && Array.isArray(d.list)) {
                combined = combined.concat(d.list);
              } else {
                console.warn('⚠️ 일부 요청 실패:', d?.resultMsg);
              }
            });

            if (combined.length > 0) {
              arrAllSchoolData = combined;
              dataLoadStatus.schoolDataLoaded = true;
              console.log('✓ 병합된 학교 데이터:', arrAllSchoolData.length, '개');
              
              // ✅ 통계 데이터 병합
              fetchStatsForSggCodes(sggCodes).then(statsMap => {
                arrAllSchoolData.forEach(s => {
                  if (s.SCHUL_CODE && statsMap[s.SCHUL_CODE]) 
                    s._stats = statsMap[s.SCHUL_CODE];
                  else if (statsMap[s.SCHUL_NM]) 
                    s._stats = statsMap[s.SCHUL_NM];
                  if (s._stats) 
                    s._stats._displayYear = statsDisplayYear;
                });
                
                // ✅ 두 데이터 모두 로드 완료 시 처리
                if (dataLoadStatus.ancDataLoaded) {
                  window.processData();
                }
              }).catch(e => { 
                console.warn('통계 병합 실패', e); 
                if (dataLoadStatus.ancDataLoaded) window.processData();
              });
            } else {
              console.warn('⚠️ 모든 요청에서 데이터 없음');
              loadAddrDataDirectly();
            }
          }).catch(err => {
            console.error('❌ 병렬 요청 처리 실패:', err.message);
            loadAddrDataDirectly();
          });
        }

        // ✅ 학교 종류 선택 함수 (초등/중등/고등)
        window.setSchoolInfo = function(schooltype) {
          var elementarySchoolControl = document.getElementById("btnElemtarySchool");
          var middleSchoolControl = document.getElementById("btnMiddleSchool");
          var highSchoolControl = document.getElementById("btnHighSchool");
          
          // UI 버튼 상태 업데이트
          if (schooltype === "Elementary") {
            elementarySchoolControl.className = "selected_btn";
            middleSchoolControl.className = "btn";
            highSchoolControl.className = "btn";
            currentSchulKnd = '02';
          } else if (schooltype === "Middle") {
            elementarySchoolControl.className = "btn";
            middleSchoolControl.className = "selected_btn";
            highSchoolControl.className = "btn";
            currentSchulKnd = '03';
          } else {
            elementarySchoolControl.className = "btn";
            middleSchoolControl.className = "btn";
            highSchoolControl.className = "selected_btn";
            currentSchulKnd = '04';
          }

          // 선택된 학교 종류로 새 데이터 로드
          var fetches = sggCodes.map(code => {
            var t = buildTargetUrl(code, '0', currentSchulKnd);
            return tryFetchJson(t)
              .catch(e => { 
                console.warn('요청 실패:', code, e.message); 
                return null; 
              });
          });

          Promise.all(fetches).then(results => {
            var combined = [];
            results.forEach(d => {
              if (d && d.resultCode === 'success' && Array.isArray(d.list)) {
                combined = combined.concat(d.list);
              }
            });

            if (combined.length > 0) {
              arrAllSchoolData = combined;
              console.log('✓ 선택된 학교 데이터 로드:', arrAllSchoolData.length, '개');
              
              // 통계 데이터 병합
              fetchStatsForSggCodes(sggCodes).then(statsMap => {
                arrAllSchoolData.forEach(s => {
                  if (s.SCHUL_CODE && statsMap[s.SCHUL_CODE]) s._stats = statsMap[s.SCHUL_CODE];
                  else if (statsMap[s.SCHUL_NM]) s._stats = statsMap[s.SCHUL_NM];
                  if (s._stats) s._stats._displayYear = statsDisplayYear;
                });
                window.processData();
              }).catch(e => { 
                console.warn('통계 병합 실패', e); 
                window.processData();
              });
            } else {
              console.warn('⚠️ 선택한 조건에 데이터 없음');
              window.processData();
            }
          }).catch(err => { 
            console.error('❌ 학교 목록 요청 실패:', err.message); 
            window.processData();
          });
        };

        // ✅ addr.json 파일 로드 (XHR 사용)
        var xhr = new XMLHttpRequest();
        xhr.open('GET', './addr.json', true);
        
        xhr.onload = function() {
          // 파일:// 프로토콜에서는 상태가 0으로 올 수 있습니다.
          if (xhr.status === 200 || xhr.status === 0) {
            try {
              console.log('📝 addr.json 받음, 길이:', xhr.responseText.length, '자');
              const data = JSON.parse(xhr.responseText);
              
              // ✅ 데이터 유효성 검사
              if (!Array.isArray(data)) {
                throw new Error('addr.json이 배열 형식이 아닙니다');
              }
              if (data.length === 0) {
                throw new Error('addr.json이 비어있습니다');
              }
              
              arrANC_Data = data;
              dataLoadStatus.ancDataLoaded = true;
              console.log('✓ 주소 데이터 로드 완료 (파일):', arrANC_Data.length, '명');
              
              // ✅ 두 데이터 모두 로드되었으면 processData() 호출
              if (dataLoadStatus.schoolDataLoaded) {
                window.processData();
              }
            } catch (parseErr) {
              console.warn('⚠️ JSON 파싱 오류:', parseErr.message);
              console.log('파일 처음 200자:', xhr.responseText.substring(0, 200));
              loadAddrDataDirectly();
            }
          } else {
            console.warn('⚠️ 파일 로드 실패 (상태:', xhr.status + ')');
            loadAddrDataDirectly();
          }
        };
        
        xhr.onerror = function() {
          console.warn('⚠️ 주소 데이터 네트워크 에러');
          loadAddrDataDirectly();
        };
        
        xhr.send();

        console.log('초기화 완료: 데이터 로드 대기 중...');
      }

      // Kakao SDK 로드 완료 확인 함수
      function waitForKakao() {
        // kakao.maps.LatLng 생성자 존재 여부로 SDK 로드 확인
        if (typeof kakao !== 'undefined' && 
            typeof kakao.maps !== 'undefined' && 
            typeof kakao.maps.LatLng === 'function') {
          console.log('✓ Kakao SDK 로드 완료');
          initializeMap();
        } else {
          // 아직 로드되지 않았으면 100ms 후 재시도
          setTimeout(waitForKakao, 100);
        }
      }

      // DOM 준비 또는 페이지 로드 후 실행
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', waitForKakao);
      } else {
        waitForKakao();
      }
      
      // 페이지 로드 후에도 확인 (안전장치)
      window.addEventListener('load', waitForKakao);
    </script>
  </body>
</html>
