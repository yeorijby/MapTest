    <div class="map_wrap">

      <!-- 학교 종류 선택 컨트롤 -->

        <span id="btnElemtarySchool" class="btn" onclick="setSchoolInfo('Elementary')">초등학교</span>
        <span id="btnMiddleSchool" class="btn" onclick="setSchoolInfo('Middle')">중학교</span>

      </div>
      
      <!-- 지도타입 선택 컨트롤 -->

        <span id="btnRoadmap" class="selected_btn" onclick="setMapType('roadmap')">지도</span>
        <span id="btnSkyview" class="btn" onclick="setMapType('skyview')">스카이뷰</span>

      <!-- 지도 확대/축소 컨트롤 -->

        </span>
        <span class="zoom-btn" onclick="zoomOut()">
          <img src="https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/ico_minus.png" alt="축소" />
        </span>
      </div>
    </div>

      // ✅ 핵심: 데이터 로드 상태 추적

      // ✅ API 호출 로그 출력용 카운터
      let apiRequestCount = 0;        // API 요청 횟수 추적
    </script>

    <script src="function.js"></script>

    <!-- ==================== 메인 초기화 로직 ==================== -->
    <script>
      /**
       * 카카오 SDK 로드 후 지도 초기화 함수
       */
      function initializeMap() {
        // 지도 컨테이너 설정
        var mapContainer = document.getElementById("map");
        var mapOption = {
          center: new kakao.maps.LatLng(37.1723, 127.0585), // 오산 세교
          level: 8
        };
        
        map = new kakao.maps.Map(mapContainer, mapOption);
        console.log('🗺️ 지도 초기화 완료');

        // ========================================================
        // ✅ 핵심 함수: 데이터 병합 및 지도 표시
        // ========================================================
        window.processData = function() {
          console.log('📊 데이터 처리 시작...');
          console.log('  - 학교 데이터:', arrAllSchoolData.length, '개');
          console.log('  - 학생 데이터:', arrANC_Data.length, '명');
          
          // 기존 마커 제거
          try {
            if (markers && markers.length > 0) {
              for (var mi = 0; mi < markers.length; mi++) {
                try { 
                  markers[mi].setMap(null);
                } catch(e){}
              }
              markers.length = 0;
            }
          } catch(e) { 
            console.warn('마커 제거 중 오류', e); 
          }

          // 최종 데이터 배열 초기화
          arrFetch.length = 0;

          // 학교와 학생 데이터 병합
          arrAllSchoolData.forEach(schoolData => {
            // 학교와 일치하는 모든 학생 찾기
            const matchedStudents = arrANC_Data.filter(
              student => student.School === schoolData.SCHUL_NM
            );

            // 일치하는 학생이 있으면 추가
            if (matchedStudents.length > 0) {
              let names = [];
              matchedStudents.forEach(student => {
                var name = student.Name || '';
                var year = (student.Year !== undefined && student.Year !== null) 
                  ? String(student.Year) 
                  : '';
                if (year !== '') name = name + '(' + year + ')';
                names.push(name);
              });
              
              const mergedData = { ...schoolData, Name: names.join(', ') };
              arrFetch.push(mergedData);
            }
          });

          console.log('✓ 병합 완료:', arrFetch.length, '개 학교');

          // 마커 생성 및 팝업 추가
          let index = 1;
          arrFetch.forEach(element => {
            var latitude = element.LTTUD;
            var longitude = element.LGTUD;

            // 팝업 내용 생성
            contents = CreateContentsTag(
              index,
              element.SCHUL_NM,
              "",
              element.SCHUL_RDNMA,
              element.DTLAD_BRKDN,
              element.HMPG_ADRES || "",
              element.Name,
              element.FOND_SC_CODE || '',
              element.USER_TELNO || element.TELNO || '',
              element.PERC_FAXNO || element.FAXNO || '',
              element.COEDU_SC_CODE || '',
              element._stats || null
            );

            // 마커 생성
            var position = new kakao.maps.LatLng(latitude, longitude);
            var marker = new kakao.maps.Marker({
              map: map,
              position: position,
            });
            markers.push(marker);

            // 팝업 생성
            var customOverlay = new kakao.maps.CustomOverlay({
              content: contents,
              map: map,
              position: marker.getPosition()
            });

            // 마커 클릭 시 팝업 표시
            kakao.maps.event.addListener(marker, "click", function () {
              customOverlay.setMap(map);
            });

            // 팝업 닫기 버튼 이벤트
            AddClickEventListener(index, customOverlay);
            customOverlay.setMap(null);
            
            index++;
          });

          console.log('✓ 지도 표시 완료:', markers.length, '개 마커 생성');
        };

        // ========================================================
        // ✅ 서버리스 API를 통한 학교 데이터 로드
        // ========================================================
        
        var apiBase = 'https://www.schoolinfo.go.kr/openApi.do';
        var sggParam = '41370,41110,41591,41593,41595,41597'; // 여러 지역
        
        var now = new Date();
        var apiPbanYr = (now.getMonth() + 1 >= 6) ? now.getFullYear() : (now.getFullYear() - 1);
        var statsDisplayYear = apiPbanYr - 1;
        var currentSchulKnd = '04'; // 기본: 고등학교

        // URL 구성 함수
        function buildTargetUrl(sgg, apiType, schulKnd) {
          apiType = typeof apiType !== 'undefined' ? apiType : '0';
          schulKnd = typeof schulKnd !== 'undefined' ? schulKnd : currentSchulKnd;
          
          // ✅ 서버리스 API 엔드포인트 사용
          return `/api/schoolinfo?sgg=${encodeURIComponent(sgg)}&apiType=${encodeURIComponent(apiType)}&sidoCode=41&schulKndCode=${encodeURIComponent(schulKnd)}`;
        }

        // fetch 래퍼 함수
        function tryFetchJson(targetUrl) {
          apiRequestCount++;
          const requestNum = apiRequestCount;
          console.log(`📡 API 요청 #${requestNum}:`, targetUrl);
          
          return fetch(targetUrl)
            .then(response => {
              if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
              }
              return response.json();
            })
            .catch(err => {
              console.error(`❌ 요청 #${requestNum} 실패:`, err.message);
              throw err;
            });
        }

        // 통계 데이터 로드 함수
        function fetchStatsForSggCodes(codes) {
          var fetches = codes.map(code => {
            var url = `/api/schoolinfo?sgg=${encodeURIComponent(code)}&apiType=09&sidoCode=41&schulKndCode=${currentSchulKnd}&pbanYr=${apiPbanYr}`;
            return tryFetchJson(url)
              .catch(e => { 
                console.warn(`⚠️ 통계 로드 실패 (${code}):`, e.message); 
                return null; 
              });
          });

          return Promise.all(fetches).then(results => {
            var statsMap = {};
            var totalCount = 0;
            
            results.forEach(d => {
              if (d && d.resultCode === 'success' && Array.isArray(d.list)) {
                totalCount += d.list.length;
                d.list.forEach(item => {
                  if (item.SCHUL_CODE) statsMap[item.SCHUL_CODE] = item;
                  if (item.SCHUL_NM && !statsMap[item.SCHUL_NM]) statsMap[item.SCHUL_NM] = item;
                });
              }
            });
            
            console.log('📊 통계 데이터 매핑:', totalCount, '개');
            return statsMap;
          });
        }

        var sggCodes = sggParam.split(',').map(s => s.trim()).filter(Boolean);

        // 학교 데이터 초기 로드
        console.log('📍 학교 데이터 로드 시작...');
        
        var fetches = sggCodes.map(code => {
          var t = buildTargetUrl(code);
          return tryFetchJson(t)
            .catch(e => { 
              console.warn(`요청 실패 (${code}):`, e.message); 
              return null; 
            });
        });

        Promise.all(fetches).then(results => {
          var combined = [];
          var successCount = 0;
          
          results.forEach((d, idx) => {
            if (d && d.resultCode === 'success' && Array.isArray(d.list) && d.list.length > 0) {
              combined = combined.concat(d.list);
              successCount++;
              console.log(`✓ 지역 ${sggCodes[idx]}: ${d.list.length}개 학교`);
            }
          });

          if (combined.length > 0) {
            arrAllSchoolData = combined;
            dataLoadStatus.schoolDataLoaded = true;
            console.log('✓ 학교 데이터 로드 완료:', combined.length, '개 (', successCount, '개 지역)');
            
            // 통계 데이터 병합
            fetchStatsForSggCodes(sggCodes).then(statsMap => {
              arrAllSchoolData.forEach(s => {
                if (s.SCHUL_CODE && statsMap[s.SCHUL_CODE]) s._stats = statsMap[s.SCHUL_CODE];
                else if (statsMap[s.SCHUL_NM]) s._stats = statsMap[s.SCHUL_NM];
                if (s._stats) s._stats._displayYear = statsDisplayYear;
              });
              
              // ✅ 두 데이터 모두 준비되면 처리
              if (dataLoadStatus.ancDataLoaded) {
                window.processData();
              }
            }).catch(e => { 
              console.warn('통계 병합 실패:', e.message); 
              if (dataLoadStatus.ancDataLoaded) window.processData();
            });
          } else {
            console.warn('⚠️ 학교 데이터를 받지 못했습니다');
            loadAddrDataDirectly();
          }
        }).catch(err => {
          console.error('❌ 학교 데이터 로드 실패:', err.message);
          loadAddrDataDirectly();
        });

        // ========================================================
        // 학교 종류 선택 함수
        // ========================================================
        window.setSchoolInfo = function(schooltype) {
          var elemControl = document.getElementById("btnElemtarySchool");
          var midControl = document.getElementById("btnMiddleSchool");
          var highControl = document.getElementById("btnHighSchool");
          
          if (schooltype === "Elementary") {
            elemControl.className = "selected_btn";
            midControl.className = "btn";
            highControl.className = "btn";
            currentSchulKnd = '02';
          } else if (schooltype === "Middle") {
            elemControl.className = "btn";
            midControl.className = "selected_btn";
            highControl.className = "btn";
            currentSchulKnd = '03';
          } else {
            elemControl.className = "btn";
            midControl.className = "btn";
            highControl.className = "selected_btn";
            currentSchulKnd = '04';
          }

          console.log(`🔄 학교 종류 변경: ${schooltype} (코드: ${currentSchulKnd})`);

          // 새로운 학교 데이터 로드
          var fetches = sggCodes.map(code => {
            var t = buildTargetUrl(code, '0', currentSchulKnd);
            return tryFetchJson(t).catch(e => { 
              console.warn(`요청 실패 (${code}):`, e.message); 
              return null; 
            });
          });

          Promise.all(fetches).then(results => {
            var combined = [];
            results.forEach(d => {
              if (d && d.resultCode === 'success' && Array.isArray(d.list)) {
                combined = combined.concat(d.list);
              }
            });

            if (combined.length > 0) {
              arrAllSchoolData = combined;
              console.log('✓ 선택된 학교 데이터:', combined.length, '개');
              
              fetchStatsForSggCodes(sggCodes).then(statsMap => {
                arrAllSchoolData.forEach(s => {
                  if (s.SCHUL_CODE && statsMap[s.SCHUL_CODE]) s._stats = statsMap[s.SCHUL_CODE];
                  else if (statsMap[s.SCHUL_NM]) s._stats = statsMap[s.SCHUL_NM];
                  if (s._stats) s._stats._displayYear = statsDisplayYear;
                });
                window.processData();
              }).catch(e => { 
                console.warn('통계 병합 실패', e.message); 
                window.processData();
              });
            } else {
              console.warn('⚠️ 데이터 없음');
              window.processData();
            }
          }).catch(err => { 
            console.error('❌ 요청 실패:', err.message); 
            window.processData();
          });
        };

        // ========================================================
        // addr.json 로드
        // ========================================================
        console.log('📝 학생 데이터 로드 시작...');
        
        var xhr = new XMLHttpRequest();
        xhr.open('GET', './addr.json', true);
        
        xhr.onload = function() {
          if (xhr.status === 200 || xhr.status === 0) {
            try {
              const data = JSON.parse(xhr.responseText);
              
              if (!Array.isArray(data) || data.length === 0) {
                throw new Error('데이터가 배열이 아니거나 비어있습니다');
              }
              
              arrANC_Data = data;
              dataLoadStatus.ancDataLoaded = true;
              console.log('✓ 학생 데이터 로드 완료:', data.length, '명');
              
              // ✅ 두 데이터 모두 로드되면 처리
              if (dataLoadStatus.schoolDataLoaded) {
                window.processData();
              }
            } catch (err) {
              console.warn('⚠️ JSON 파싱 오류:', err.message);
              loadAddrDataDirectly();
            }
          } else {
            console.warn('⚠️ 파일 로드 실패 (상태:', xhr.status + ')');
            loadAddrDataDirectly();
          }
        };
        
        xhr.onerror = function() {
          console.warn('⚠️ 파일 로드 네트워크 오류');
          loadAddrDataDirectly();
        };
        
        xhr.send();
      }

      // Kakao SDK 로드 확인
      function waitForKakao() {
        if (typeof kakao !== 'undefined' && 
            typeof kakao.maps !== 'undefined' && 
            typeof kakao.maps.LatLng === 'function') {
          console.log('✓ Kakao SDK 준비 완료');
          initializeMap();
        } else {
          setTimeout(waitForKakao, 100);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', waitForKakao);
      } else {
        waitForKakao();
      }
      
      window.addEventListener('load', waitForKakao);
