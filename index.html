    <script>
      // Kakao SDK 로드 완료 후 실행되는 함수
      function initializeMap() {
        var mapContainer = document.getElementById("map"), // 지도를 표시할 div
        mapOption = {
          center: new kakao.maps.LatLng(37.1723, 127.0585),   // 오산 세교 지역
          // center: new kakao.maps.LatLng(33.451475, 126.570528), // 제주도 지역
          level: 8, // 지도의 확대 레벨
        };
        ///33.451475, 126.570528
        map = new kakao.maps.Map(mapContainer, mapOption); // 지도를 생성합니다 (전역변수에 할당)

        //=======================================================================================================================================================
        // 내가 해본거 말고 다른걸로 해보는것
        // 2023.03.08
        //=======================================================================================================================================================
        // arrAllSchoolData와 arrANC_Data를 비교하여 일치하는 데이터를 찾아서 처리하는 함수
        window.processData = function() {
          //const arrFetch = [];
          arrFetch.length = 0;

          arrAllSchoolData.forEach(schoolData => {
            //const matchedSchoolData = arrANC_Data.find(ancData => ancData.School === schoolData.FACLT_NM);          // find로 했을 때 - 단수일경우      
            const matchedSchoolData = arrANC_Data.filter(ancData => ancData.School === schoolData.FACLT_NM);          // filter 로 했을 때 - 복수일 경우       

            // find로 했을 때 - 단수일경우
            // if (matchedSchoolData) {
            //     const dataToAdd = { ...schoolData, name: matchedSchoolData.Name };
            //     //console.log("schoolData.FACLT_NM : ", schoolData.FACLT_NM, "dataToAdd", dataToAdd);
            //     arrFetch.push(dataToAdd);
            // }

            // filter 로 했을 때 - 복수일 경우 
            let bFirst = true;
            let strName = "";
            if (matchedSchoolData.length > 0) {
              matchedSchoolData.forEach(metchedData => {

                if (bFirst === true) {
                  strName = metchedData.Name;
                  bFirst = false;
                }
                else {
                  strName += ", " + metchedData.Name;
                }
              })
              //console.log(strName);
              const dataToAdd = { ...schoolData, Name: strName };
              arrFetch.push(dataToAdd);
            }
          });

          let i = 1; // 이런 경우 굳이 인덱스 일 필요(0으로 시작할 필요)가?

          //.log(arrFetch);
          arrFetch.forEach(element => {
          var latitude = element.REFINE_WGS84_LAT;
          var longitude = element.REFINE_WGS84_LOGT;


          contents = CreateContentsTag(
            i,
            element.FACLT_NM,   // "카카오 스페이스닷원",
            "",//element.image,    // "https://t1.kakaocdn.net/kakaocorp/kakaocorp/admin/community/83cd8a98017a00001.png", //"https://cfile181.uf.daum.net/image/250649365602043421936D",
            element.REFINE_ROADNM_ADDR,     // "제주특별자치도 제주시 첨단로 242",
            element.REFINE_LOTNO_ADDR,    // "(우) 63309 (지번) 영평동 2181",
            "",//element.home,     // "https://www.kakaocorp.com/main",
            element.Name
          );


          // 커스텀 오버레이가 표시될 위치입니다
          var position = new kakao.maps.LatLng(latitude, longitude);

          // 지도에 마커를 표시합니다
          var marker = new kakao.maps.Marker({
            map: map,
            position: position, //new kakao.maps.LatLng(latitude, longitude),
          });

          markers.push(marker);

          // 커스텀 오버레이를 생성합니다
          var customOverlay = new kakao.maps.CustomOverlay({
            content: contents,
            map: map,
            position: marker.getPosition()
          });

          // 마커를 클릭했을 때 커스텀 오버레이를 표시합니다
          kakao.maps.event.addListener(marker, "click", function () {
            customOverlay.setMap(map);
          });

          // 닫는 동작 하기 위해서
          AddClickEventListener(i, customOverlay);

          // 기본적으로 닫아놓고 마커만 표시해놓는다. 
          customOverlay.setMap(null);
          i++;
          });
        };

        //-------------------------------------------------------------------------------------------------------------------------------------------------------

        // 위에서 작성한 코드를 사용하여 데이터 처리
        var api_key = "d4a05bcb15d24e529878d61117e4a187";
        var url = 'https://openapi.gg.go.kr/MskulM'; /*URL*/
        var queryParams = '?' + encodeURIComponent('Key') + '='+api_key; /*Service Key*/
        queryParams += '&' + encodeURIComponent('type') + '=' + encodeURIComponent('json'); /**/
        queryParams += '&' + encodeURIComponent('pIndex') + '=' + encodeURIComponent(1); /**/
        queryParams += '&' + encodeURIComponent('pSize') + '=' + encodeURIComponent(1000); /**/   
        
        var uri = url + queryParams;
        // 비동기 방식이라 시점이 중요하다.
        // 해당 블록을 벗어나면 의미 없어진다???
        fetch(uri)
          .then(response => response.json())
          .then(data => {
            console.log('📡 API 응답 전체:', data);
            console.log('📊 응답 구조:');
            console.log('  - data 타입:', typeof data);
            console.log('  - data의 keys:', Object.keys(data));
            if (data.MskulM) {
              console.log('  - data.MskulM.head:', data.MskulM.head);
              console.log('  - data.MskulM.row 타입:', Array.isArray(data.MskulM.row) ? '배열' : typeof data.MskulM.row);
              if (Array.isArray(data.MskulM.row)) {
                console.log('  - data.MskulM.row 길이:', data.MskulM.row.length);
              }
              console.log('  - data.MskulM의 모든 keys:', Object.keys(data.MskulM));
              console.log('  - data.MskulM 전체:', JSON.stringify(data.MskulM).substring(0, 500));
            }
            
            // API 에러 체크 - MskulM이 배열 형식
            if (Array.isArray(data.MskulM) && data.MskulM.length >= 2) {
              const head = data.MskulM[0].head;  // head 배열
              const resultItem = head.find(h => h.RESULT);  // RESULT가 있는 항목 찾기
              if (resultItem && resultItem.RESULT && resultItem.RESULT.CODE && resultItem.RESULT.CODE.includes('ERROR')) {
                console.warn('⚠️ API 에러:', resultItem.RESULT.CODE, resultItem.RESULT.MESSAGE);
                console.log('학생 데이터를 사용합니다.');
                arrANC_Data = studient;
                processData();
                return;
              }
              
              // row 데이터 추출
              const rowData = data.MskulM[1].row;
              if (Array.isArray(rowData)) {
                arrAllSchoolData = rowData;
                console.log('✓ 중학교 데이터 로드 성공:', arrAllSchoolData.length, '개');
                processData();
                return;
              }
            }
            
            // HgschlM (고등학교) 처리 - 동일한 배열 구조
            if (Array.isArray(data.HgschlM) && data.HgschlM.length >= 2) {
              const head = data.HgschlM[0].head;
              const resultItem = head.find(h => h.RESULT);
              if (resultItem && resultItem.RESULT && resultItem.RESULT.CODE && resultItem.RESULT.CODE.includes('ERROR')) {
                console.warn('⚠️ API 에러:', resultItem.RESULT.CODE, resultItem.RESULT.MESSAGE);
              } else {
                const rowData = data.HgschlM[1].row;
                if (Array.isArray(rowData)) {
                  arrAllSchoolData = rowData;
                  console.log('✓ 고등학교 데이터 로드 성공:', arrAllSchoolData.length, '개');
                  processData();
                  return;
                }
              }
            }
            
            // 다른 형식 시도
            const keys = Object.keys(data);
            let found = false;
            for (let key of keys) {
              if (Array.isArray(data[key]) && data[key].length >= 2 && data[key][1].row) {
                arrAllSchoolData = data[key][1].row;
                console.log('✓ 학교 데이터 로드 성공:', arrAllSchoolData.length, '개');
                processData();
                found = true;
                break;
              }
            }
            
            if (!found) {
              console.log('>>> 224번 줄 실행: row 데이터를 찾을 수 없음. 학생 데이터 사용');
              console.warn('⚠️ row 데이터를 찾을 수 없음. 학생 데이터 사용');
              arrANC_Data = studient;
              processData();
            }
          })
          .catch(err => {
            console.error('❌ 학교 API 요청 실패:', err);
            console.log('학생 데이터를 사용합니다.');
            arrANC_Data = studient;
            processData();
          });

        // XMLHttpRequest로 addr.json 파일 읽기
        var xhr = new XMLHttpRequest();
        xhr.open('GET', './addr.json', true);
        
        xhr.onload = function() {
          // file:// 프로토콜에서는 상태가 0으로 올 수 있음
          if (xhr.status === 200 || xhr.status === 0) {
            try {
              console.log('📝 addr.json 텍스트 받음, 길이:', xhr.responseText.length);
              const data = JSON.parse(xhr.responseText);
              arrANC_Data = data;
              console.log('✓ 주소 데이터 로드 성공 (파일):', arrANC_Data.length, '개');
              processData();
            } catch (parseErr) {
              console.warn('⚠️ JSON 파싱 오류:', parseErr.message);
              console.log('파일 내용 처음 200자:', xhr.responseText.substring(0, 200));
              loadAddrDataDirectly();
            }
          } else {
            console.warn('⚠️ 파일 로드 실패 (상태:', xhr.status + ')');
            loadAddrDataDirectly();
          }
        };
        
        xhr.onerror = function() {
          console.warn('⚠️ 주소 데이터 로드 실패 (네트워크 에러)');
          console.log('직접 데이터로 대체합니다.');
          loadAddrDataDirectly();
        };
        
        xhr.send();

        console.log(arrFetch);
      }

      // Kakao SDK가 로드될 때까지 기다렸다가 맵 초기화
      function waitForKakao() {
        // kakao.maps.LatLng 생성자가 존재하는지 확인 (SDK 완전 로드 확인)
        if (typeof kakao !== 'undefined' && 
            typeof kakao.maps !== 'undefined' && 
            typeof kakao.maps.LatLng === 'function') {
          initializeMap();
        } else {
          // Kakao SDK가 아직 로드되지 않았으면 100ms 후 다시 확인
          setTimeout(waitForKakao, 100);
        }
      }

      // DOM이 준비되고 Kakao SDK 로드 대기
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', waitForKakao);
      } else {
        waitForKakao();
      }
      
      // 페이지 로드 후에도 확인 (안전장치)
      window.addEventListener('load', waitForKakao);
    </script>
